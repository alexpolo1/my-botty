name: botty
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pywin32
  - pip
  - tesserocr   # conda-forge build — compiled against conda-forge tesseract/leptonica,
                # so all DLL deps are resolved automatically within the env
  - tesseract   # version chosen by conda to match tesserocr
  - pkg-config
  - rapidfuzz=2.15.1
  - pip:
    - pyinstaller
    - opencv-python==4.5.5.64
    - transitions
    - mss==7.0.1
    - numpy==1.26.4
    - mouse
    - keyboard
    - beautifultable
    - pytweening
    - requests
    - coverage
    - pytest
    - pytest-env
    - pytest-mock
    - pyparsing
    - graphviz
    - psutil
    - cryptography
    - pillow
    - discord.py
    - parse
    - typing_extensions
    - colorama
    - dataclasses-json
